<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ting's 記帳網站</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="wrap">
    <div class="topbar">
  <button id="drawerOpenBtn" class="icon-btn" type="button" aria-label="開啟選單">
    ☰
  </button>

  <div class="nickname">Ting</div>
</div>

<div id="drawerOverlay" class="drawer-overlay"></div>

<aside id="sideDrawer" class="side-drawer" aria-label="側邊選單">
  <div class="drawer-header">
    <div class="drawer-title">功能選單</div>
    <button id="drawerCloseBtn" class="icon-btn" type="button" aria-label="關閉選單">
      ✕
    </button>
  </div>

  <nav class="drawer-nav">
    <a class="drawer-link active" href="./index.html">單人</a>
    <a class="drawer-link" href="./multi.html">多人</a>
    <a class="drawer-link" href="./dispute.html">我跟 XXX 的金錢往來</a>
  </nav>
</aside>

    <section class="card">
      <h1 class="section-title">單人記帳</h1>

      <form id="entryForm" class="form-grid">
        <div class="two-col">
          <div class="field">
            <label for="date">日期</label>
            <input id="date" name="date" type="date" required />
          </div>
          <div class="field">
            <label for="time">時間</label>
            <input id="time" name="time" type="time" required />
          </div>
        </div>

        <div class="two-col">
          <div class="field">
            <label for="category">分類</label>
            <select id="category" name="category" required>
              <option value="">請選擇</option>
              <option>餐飲</option>
              <option>交通</option>
              <option>娛樂</option>
              <option>購物</option>
              <option>追星</option>
              <option>收入</option>
              <option>其他</option>
            </select>
          </div>

          <div class="field">
            <label for="detail">細項</label>
            <input id="detail" name="detail" type="text" placeholder="例如：晚餐、DM" required />
          </div>
        </div>

        <div class="two-col">
          <div class="field">
            <label for="amount">金額</label>
            <input id="amount" name="amount" type="number" min="0" step="0.01" placeholder="請輸入金額" required />
          </div>

          <div class="field">
            <label for="currency">幣別</label>
            <select id="currency" name="currency" required>
              <option value="TWD">TWD</option>
              <option value="JPY">JPY</option>
              <option value="KRW">KRW</option>
            </select>
          </div>
        </div>

        <div class="two-col">
          <div class="field">
            <label for="type">支出／收入</label>
            <select id="type" name="type" required>
              <option value="expense">支出</option>
              <option value="income">收入</option>
            </select>
          </div>

          <div class="field">
            <label for="account">帳戶</label>
            <select id="account" name="account" required>
              <option value="">請選擇</option>
              <option>現金</option>
              <option>中信</option>
              <option>台新</option>
              <option>隨取卡</option>
              <option>其他</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label for="note">備註</label>
          <textarea id="note" name="note" placeholder="可寫可不寫，例如：跟朋友出去、臨時加買、這筆真的很不該花"></textarea>
        </div>

        <div class="action-row">
          <button class="btn btn-primary" type="submit">新增</button>
        </div>
      </form>

      <div class="helper">
        資料會同步到 Google 試算表。
      </div>
    </section>

    <section class="card">
  <button
    id="summaryToggle"
    class="collapse-toggle"
    type="button"
    aria-expanded="false"
    aria-controls="summaryContent"
  >
    <span>總覽</span>
    <span id="summaryToggleText">展開</span>
  </button>

  <div id="summaryContent" class="collapse-content" hidden>
    <div id="summaryGrid" class="summary-grid"></div>
  </div>
</section>

    <section class="card">
      <h2 class="section-title">明細</h2>
      <div id="details"></div>
    </section>
  </div>

  <script src="./ui.js"></script>
  <script src="./app.js"></script>
</body>
</html>
